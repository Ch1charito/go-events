<article class="card">
  <img class="card__image" [src]="event().imageUrl" [alt]="event().title" draggable="false" />
  <div class="card__overlay"></div>

  <div class="card__content">
    <span class="pill">{{ categoryLabel() }}</span>
    <h2 class="card__title">{{ event().title }}</h2>
    <p class="card__meta">
      {{ event().start | date: 'EE dd.MM. · HH:mm' }} · {{ event().locationName }} ·
      {{ event().district }}
    </p>
    <div class="card__tags">
      @for (tag of event().tags; track tag) {
        <span class="pill">{{ tag }}</span>
      }
      @if (priceLabel(); as price) {
        <span class="pill">{{ price }}</span>
      }
      @if (event().minAge; as minAge) {
        <span class="pill">{{ minAge }}+</span>
      }
    </div>
  </div>
</article>
